name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check & lint
        run: npx tsc --noEmit

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/opt/docker-projects/standalone-apps/brightdata/market-signal-terminal"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            docker compose build --no-cache
            docker compose up -d
            echo "Deployed at $(date)"
