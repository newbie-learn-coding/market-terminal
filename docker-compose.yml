services:
  market-terminal:
    build: .
    container_name: market-terminal
    restart: unless-stopped
    ports:
      - "3100:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    external: true
