services:
  market-terminal:
    build: .
    container_name: market-terminal
    restart: unless-stopped
    ports:
      - "3100:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    networks:
      - proxy-tier
      - supabase-tier
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy-tier:
    external: true
    name: nginx-proxy_default
  supabase-tier:
    external: true
    name: supabase_default
